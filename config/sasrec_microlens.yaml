# ----- Environment -----
data_path: ./dataset
checkpoint_dir: ./checkpoints/
use_gpu: true
gpu_id: 0
state_tracker: ['Tensorboard']

# ----- Dataset fields -----
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp
load_col:
  inter: [user_id, item_id, timestamp]
ITEM_LIST_LENGTH_FIELD: item_length
LIST_SUFFIX: _list
MAX_ITEM_LIST_LENGTH: 13

# ----- Data split: leave-one-out -----
eval_args:
  split: {LS: 'valid_and_test'}
  group_by: user
  order: TO
  mode: full

# ----- Metrics -----
metrics: [Hit, NDCG]
topk: [10, 20]
valid_metric: NDCG@10

# ----- Training -----
train_neg_sample_args: ~
loss_type: CE
epochs: 100
train_batch_size: 512
eval_batch_size: 2048
eval_step: 5
stopping_step: 5

# ----- Optimizer -----
learner: adamw
learning_rate: 1e-5
weight_decay: 0.1

# ----- SASRec (Table 5, microLens paper) -----
hidden_size: 2048
n_layers: 2
n_heads: 2
hidden_dropout_prob: 0.1
attn_dropout_prob: 0.1
